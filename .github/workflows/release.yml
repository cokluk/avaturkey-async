name: Release

on:
  push:
    branches:
      - main
  workflow_dispatch:

permissions:
  contents: write

concurrency:
  group: release-main
  cancel-in-progress: true

jobs:
  build-windows:
    name: Build (Windows x64)
    runs-on: windows-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure
        run: cmake -B build "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --config Release

      - name: Package
        run: Compress-Archive -Path build/Release/avaturkey.exe -DestinationPath avaturkey-windows-x64.zip

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avaturkey-windows-x64
          path: avaturkey-windows-x64.zip
          if-no-files-found: error

  build-linux:
    name: Build (Linux x64)
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install dependencies
        run: sudo apt-get update && sudo apt-get install -y cmake build-essential

      - name: Configure
        run: cmake -B build "-DCMAKE_POLICY_VERSION_MINIMUM=3.5" -DCMAKE_BUILD_TYPE=Release

      - name: Build
        run: cmake --build build --parallel

      - name: Package
        run: |
          chmod +x build/avaturkey
          cd build && zip ../avaturkey-linux-x64.zip avaturkey

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: avaturkey-linux-x64
          path: avaturkey-linux-x64.zip
          if-no-files-found: error

  release:
    name: Publish GitHub Release
    needs: [build-windows, build-linux]
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifacts
        uses: actions/download-artifact@v4
        with:
          path: dist
          merge-multiple: true

      - name: Prepare release metadata
        id: meta
        shell: bash
        run: |
          SHORT_SHA="${GITHUB_SHA::7}"
          TAG="release-${GITHUB_RUN_NUMBER}"
          TITLE="Release #${GITHUB_RUN_NUMBER} (${SHORT_SHA})"
          echo "tag=${TAG}" >> "$GITHUB_OUTPUT"
          echo "title=${TITLE}" >> "$GITHUB_OUTPUT"
          echo "Artifacts:"
          ls -la dist/

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ steps.meta.outputs.tag }}
          name: ${{ steps.meta.outputs.title }}
          make_latest: true
          generate_release_notes: true
          files: |
            dist/avaturkey-windows-x64.zip
            dist/avaturkey-linux-x64.zip
          body: |
            ## Avaturkey Game Server

            Automated release from branch **`main`** (`${{ github.sha }}`).

            TCP game server for Avataria-style Flash clients (port **4333**).
            Requires a running **Redis** instance for player data persistence.

            ### Downloads
            | Platform | Archive |
            |----------|---------|
            | Windows x64 | `avaturkey-windows-x64.zip` |
            | Linux x64 | `avaturkey-linux-x64.zip` |

            ### Quick start
            ```bash
            redis-server
            ./avaturkey          # Linux
            avaturkey.exe        # Windows
            ```
